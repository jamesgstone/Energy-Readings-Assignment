apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  labels:
    app: redis
    assignment-id: {{ .Values.assignmentId | quote }}
spec:
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        assignment-id: {{ .Values.assignmentId | quote }}
    spec:
      containers:
      - name: redis
        image: {{ .Values.redis.image }}
        ports:
        - containerPort: 6379
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  labels:
    assignment-id: {{ .Values.assignmentId | quote }}
spec:
  selector:
    app: redis
  ports:
  - port: {{ .Values.redis.service.port }}
    targetPort: 6379