apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-api
  labels:
    assignment-id: {{ .Values.assignmentId | quote }}
spec:
  replicas: {{ .Values.ingestion.replicaCount }}
  selector:
    matchLabels:
      app: ingestion-api
  template:
    metadata:
      labels:
        app: ingestion-api
        assignment-id: {{ .Values.assignmentId | quote }}
    spec:
      containers:
      - name: ingestion-api
        image: {{ .Values.ingestion.image }}
        ports:
        - containerPort: 8000
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        env:
        - name: REDIS_HOST
          value: "redis-service"
        - name: REDIS_PORT
          value: {{ .Values.redis.service.port | quote }}
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ingestion-api-service
  labels:
    assignment-id: {{ .Values.assignmentId | quote }}
spec:
  type: NodePort 
  selector:
    app: ingestion-api
  ports:
  - port: {{ .Values.ingestion.service.port }}
    targetPort: 8000
    nodePort: {{ .Values.ingestion.service.nodePort }}