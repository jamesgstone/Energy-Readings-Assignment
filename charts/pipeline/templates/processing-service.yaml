apiVersion: apps/v1
kind: Deployment
metadata:
  name: processing-service
spec:
  replicas: {{ .Values.processing.replicaCount }}
  selector:
    matchLabels:
      app: processing-service
  template:
    metadata:
      labels:
        app: processing-service
    spec:
      containers:
      - name: processing-service
        image: {{ .Values.processing.image }}
        ports:
        - containerPort: 8000
        env:
        - name: REDIS_HOST
          value: "redis-service"
        - name: REDIS_PORT
          value: "6379"
---
apiVersion: v1
kind: Service
metadata:
  name: processing-service
spec:
  type: ClusterIP
  selector:
    app: processing-service
  ports:
  - port: 8000
    targetPort: 8000